buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "26.1.10909125"
        kotlinVersion = "2.0.21"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // AGP must have an explicit version — the composite build does NOT
        // provide classpath coordinate versions for non-React-Native artifacts.
        classpath("com.android.tools.build:gradle:8.5.0")
        // Kotlin plugin — explicit version required for the same reason.
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        // React Native Gradle plugin version comes from the composite build
        // registered via pluginManagement.includeBuild in settings.gradle.
        classpath("com.facebook.react:react-native-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"
