buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.1.8937393"
        kotlinVersion = "1.8.0"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.1.1")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        // react-native-gradle-plugin is NOT declared here.
        // It is provided via the top-level includeBuild in settings.gradle
        // (a Gradle composite build) once `npm install` has been run.
    }
}

// Apply the React Native root-project plugin only when the package is present.
def rnPlugin = file("../node_modules/@react-native/gradle-plugin")
if (rnPlugin.exists()) {
    apply plugin: "com.facebook.react.rootproject"
}
