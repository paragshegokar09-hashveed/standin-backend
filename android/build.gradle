buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.1.8937393"
        kotlinVersion = "1.8.0"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.1.1")
        // react-native-gradle-plugin version is resolved via the includeBuild declared in
        // settings.gradle, which only activates after `npm install` has been run.
        // The classpath entry is omitted when node_modules does not exist yet so that
        // basic tasks like `clean` can still run before JS dependencies are installed.
        if (file("../node_modules/@react-native/gradle-plugin").exists()) {
            classpath("com.facebook.react:react-native-gradle-plugin")
        }
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

if (file("../node_modules/@react-native/gradle-plugin").exists()) {
    apply plugin: "com.facebook.react.rootproject"
}
