apply plugin: "com.android.application"

def rnPlugin = new File(rootProject.projectDir, "../node_modules/@react-native/gradle-plugin")
if (rnPlugin.exists()) {
    apply plugin: "com.facebook.react"
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdkVersion rootProject.ext.compileSdkVersion

    namespace "com.standin"

    defaultConfig {
        applicationId "com.standin"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            // enableProguardInReleaseBuilds is set by the React Native plugin.
            // Falls back to false when the plugin is not applied (no node_modules).
            minifyEnabled (rnPlugin.exists() ? enableProguardInReleaseBuilds : false)
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // Versions are resolved via the React Native BOM applied by the
    // 'com.facebook.react' plugin. Only included when node_modules is present.
    if (rnPlugin.exists()) {
        implementation("com.facebook.react:react-android")
        implementation("com.facebook.react:hermes-android")
    }
}
