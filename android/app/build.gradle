apply plugin: "com.android.application"

// The React Native plugin is provided by a composite build (includeBuild in
// settings.gradle). It is only applied when node_modules is populated, so that
// tasks like `clean` continue to work before `npm install` is run.
def rnPlugin = new File(rootProject.projectDir, "../node_modules/@react-native/gradle-plugin")
if (rnPlugin.exists()) {
    apply plugin: "com.facebook.react"
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdkVersion rootProject.ext.compileSdkVersion

    namespace "com.standin"

    defaultConfig {
        applicationId "com.standin"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            // enableProguardInReleaseBuilds is set by the React Native Gradle plugin.
            // Fall back to false when building without node_modules (e.g. `clean`).
            minifyEnabled (rnPlugin.exists() ? enableProguardInReleaseBuilds : false)
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // Versions are managed by the React Native BOM that the 'com.facebook.react'
    // plugin applies automatically once node_modules is present.
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
}
