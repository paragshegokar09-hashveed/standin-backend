apply plugin: "com.android.application"

// The React Native plugin is provided by a composite build (includeBuild in
// settings.gradle). It is only applied when node_modules is populated, so that
// tasks like `clean` continue to work before `npm install` is run.
def rnPlugin = new File(rootProject.projectDir, "../node_modules/@react-native/gradle-plugin")
if (rnPlugin.exists()) {
    apply plugin: "com.facebook.react"
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdkVersion rootProject.ext.compileSdkVersion

    namespace "com.standin"

    defaultConfig {
        applicationId "com.standin"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // React Native dependencies are only needed when building the full app.
    // They are omitted here intentionally; the user's actual app/build.gradle
    // should declare com.facebook.react:react-android and hermes-android.
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
}
