pluginManagement {
    // The React Native Gradle plugin lives inside node_modules and is only
    // available after `npm install` has been run in the project root.
    // We guard the includeBuild so the project can still configure (e.g. clean)
    // before node_modules exists.
    def rnPlugin = file("../node_modules/@react-native/gradle-plugin")
    if (rnPlugin.exists()) {
        includeBuild(rnPlugin.absolutePath)
    }
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

rootProject.name = 'StandIn'
include ':app'
