pluginManagement {
    // Plugin repositories for both the plugins {} DSL and classpath resolution.
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

// Top-level includeBuild (outside pluginManagement) makes the React Native
// Gradle plugin available to ALL sub-projects via composite build — no
// classpath() entry needed and no version number required.
// This block is skipped when node_modules does not exist yet (e.g. before
// `npm install` is run), so tasks like `clean` still work pre-install.
def rnPlugin = file("../node_modules/@react-native/gradle-plugin")
if (rnPlugin.exists()) {
    includeBuild(rnPlugin.absolutePath)
}

rootProject.name = 'StandIn'
include ':app'
